name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (type-check + lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_build/package-lock.json

      - run: npm ci

      - run: npm run type-check

      - run: npm run lint

      - run: npm run format:check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app_build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_build/package-lock.json

      - run: npm ci

      - run: npm run test

